<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>matthew.quest — games</title>
<meta name="description" content="Games on matthew.quest.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="../images/favicon.ico">
<link rel="stylesheet" href="../style.css">
</head>
<body>

  <div class="grid-overlay" aria-hidden="true"></div>
  <div class="mouse-glow" aria-hidden="true"></div>

  <div class="page">
  <main class="console">
    <header class="console__bar" title="Drag to move">
      <span class="dot dot--red"></span>
      <span class="dot dot--amber"></span>
      <span class="dot dot--green"></span>
      <span class="console__title">games.sh</span>
    </header>

    <div class="console__body">
      <p class="console__line console__line--muted">$ ls games/</p>

      <div class="games-list">
        <a class="games-list__item" href="snake/">
          <span class="games-list__name">snake/</span>
          <span class="games-list__desc">classic grid snake</span>
        </a>
        <a class="games-list__item" href="wordle/">
          <span class="games-list__name">wordle/</span>
          <span class="games-list__desc">unlimited word puzzle</span>
        </a>
      </div>
    </div>
  </main>
  </div>

  <div class="side-nav">
    <div class="side-nav__trigger" aria-hidden="true"></div>
    <nav class="taskbar" id="taskbar" aria-label="Site navigation">
      <button class="taskbar__handle" id="taskbarHandle" type="button" aria-expanded="false" aria-label="Toggle navigation">
        <svg class="taskbar__arrow" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M5 2L11 8L5 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="taskbar__panel">
        <a class="taskbar__link" href="../">home</a>
      </div>
    </nav>
  </div>

  <script src="../common.js?v=1"></script>
</body>
</html>
