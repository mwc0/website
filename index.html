<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>matthew.quest</title>
<meta name="description" content="matthew.quest — tools and games.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="images/favicon.ico">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <canvas id="rippleCanvas" class="ripple-layer" aria-hidden="true"></canvas>

  <div class="page">
  <main class="console">
    <div class="console__body">
      <p class="console__line console__line--muted">$ ls ~</p>

      <div class="games-list">
        <a class="games-list__item" href="tools/">
          <span class="games-list__name">tools/</span>
          <span class="games-list__desc">unit + currency converter</span>
        </a>
        <a class="games-list__item" href="games/">
          <span class="games-list__name">games/</span>
          <span class="games-list__desc">snake, wordle, driftwalk</span>
        </a>
      </div>
    </div>
  </main>
  </div>

  <div class="side-nav side-nav--right">
    <div class="side-nav__trigger" aria-hidden="true"></div>
    <nav class="taskbar" id="taskbar" aria-label="Site navigation">
      <button class="taskbar__handle" id="taskbarHandle" type="button" aria-expanded="false" aria-label="Toggle navigation">
        <svg class="taskbar__arrow" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M5 2L11 8L5 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="taskbar__panel">
        <a class="taskbar__link" href="tools/">tools</a>
        <a class="taskbar__link" href="games/">games</a>
      </div>
    </nav>
  </div>

  <script src="ripple-bg.js?v=1"></script>
  <script src="common.js?v=1"></script>
</body>
</html>
